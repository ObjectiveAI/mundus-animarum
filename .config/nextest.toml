# Integration tests each boot a per-state postgres and spawn the objectiveai
# host (plus, for MCP tests, plugin subprocesses). Every test is isolated by
# its own OBJECTIVEAI_STATE, and the notification flow is deterministic
# (spawn_detached -> agents wait -> CLI set -> resume) with no cross-test
# timing dependency — so run with as many threads as the system has.
[profile.default]
test-threads = "num-cpus"

# Don't fail the run on the nextest "leaky" warning: a mock-agent completion
# brings up the plugin as a DETACHED MCP server (Windows) that outlives the
# test; the host's `kill-all` reaps it between runs.
leak-timeout = "2s"
